function parseFood(input) {
  const text = input.toLowerCase().trim();
  const items = [];
  const used = new Set();
  const keys = Object.keys(FOOD_DB).sort((a,b) => b.length - a.length);
  for (const key of keys) {
    if (used.has(key)) continue;
    const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp("(?:^|[,\\s])([\\d.]+)?\\s*(?:scoops?\\s+|cups?\\s+|slices?\\s+|oz\\s+|tbsp\\s+|pieces?\\s+)?("+escaped+")(?=[\\s,.]|$)", "i");
    const m = text.match(re);
    if (!m) continue;
    const qty = parseFloat(m[1] || "1") || 1;
    const db = FOOD_DB[key];
    items.push({ name:key, quantity:qty+" x "+db.unit, cal:Math.round(db.cal*qty), pro:Math.round(db.pro*qty), carb:Math.round(db.carb*qty), fat:Math.round(db.fat*qty), sug:Math.round((db.sug||0)*qty) });
    used.add(key);
    for (const other of keys) { if (other !== key && key.includes(other)) used.add(other); }
  }
  if (!items.length) return null;
  const totals = items.reduce((a,i) => ({ cal:a.cal+i.cal, pro:a.pro+i.pro, carb:a.carb+i.carb, fat:a.fat+i.fat, sug:a.sug+(i.sug||0) }), {cal:0,pro:0,carb:0,fat:0,sug:0});
  return { items, cal:totals.cal, pro:totals.pro, carb:totals.carb, fat:totals.fat, sug:totals.sug };
}

  const [editing, setEditing] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [foodInput, setFoodInput] = useState("");
  const [foodErr, setFoodErr] = useState("");
  const [wInput, setWInput] = useState("");
  const [aiQ, setAiQ] = useState("");
  const [aiA, setAiA] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [manCal, setManCal] = useState(""); const [manPro, setManPro] = useState(""); const [manCarb, setManCarb] = useState(""); const [manFat, setManFat] = useState(""); const [manSug, setManSug] = useState(""); const [manLabel, setManLabel] = useState("");

  useEffect(() => { try { localStorage.setItem("nut3", JSON.stringify(nut)); } catch {} }, [nut]);
  useEffect(() => { try { localStorage.setItem("wlog", JSON.stringify(weights)); } catch {} }, [weights]);
  useEffect(() => { try { localStorage.setItem("done", JSON.stringify(done)); } catch {} }, [done]);
  useEffect(() => { try { localStorage.setItem("cw", JSON.stringify(custom)); } catch {} }, [custom]);

  const wo = buildWorkouts(week);
  const today = wo[day];
  const tgt = TARGETS_NUT[day];
  const nk = "w"+week+"_"+day;
  const todayNut = nut[nk] || emptyDay();
  const allEx = today.blocks.flatMap(b => b.exercises);
  const doneCount = allEx.filter(e => done["w"+week+"_"+day+"_"+e.name]).length;
  const pct = allEx.length ? Math.round(doneCount/allEx.length*100) : 0;
  const wTag = W[week].tag;
  const tagCol = TAG_COLOR[wTag];
  const latestW = weights.length ? weights[weights.length-1].w : 235;

  function updateNut(patch) {
    setNut(prev => ({ ...prev, [nk]: { ...emptyDay(), ...prev[nk], ...patch } }));
  }

  function addMeal(meal) {
    const existing = nut[nk] || emptyDay();
    const meals = [...(existing.meals||[]), meal];
    const t = meals.reduce((a,m) => ({cal:a.cal+(m.cal||0),pro:a.pro+(m.pro||0),carb:a.carb+(m.carb||0),fat:a.fat+(m.fat||0),sug:a.sug+(m.sug||0)}),{cal:0,pro:0,carb:0,fat:0,sug:0});
    setNut(prev => ({ ...prev, [nk]: { ...existing, meals, ...t } }));
  }

  function removeMeal(idx) {
    const existing = nut[nk] || emptyDay();
    const meals = existing.meals.filter((_,i) => i !== idx);
    const t = meals.reduce((a,m) => ({cal:a.cal+(m.cal||0),pro:a.pro+(m.pro||0),carb:a.carb+(m.carb||0),fat:a.fat+(m.fat||0),sug:a.sug+(m.sug||0)}),{cal:0,pro:0,carb:0,fat:0,sug:0});
    setNut(prev => ({ ...prev, [nk]: { ...existing, meals, ...t } }));
  }

  function logFood() {
    if (!foodInput.trim()) return;
    setFoodErr("");
    const result = parseFood(foodInput);
    if (result) {
      addMeal({ desc:foodInput, items:result.items, cal:result.cal, pro:result.pro, carb:result.carb, fat:result.fat, sug:result.sug||0, time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) });
      setFoodInput("");
    } else {
      setFoodErr("Food not recognized — use manual entry below or try simpler names like 'chicken breast' or 'oikos pro'");
    }
  }

  function logManual() {
    if (!manCal && !manPro) return;
    addMeal({ desc:manLabel||"Manual entry", items:[], cal:parseInt(manCal)||0, pro:parseInt(manPro)||0, carb:parseInt(manCarb)||0, fat:parseInt(manFat)||0, sug:parseInt(manSug)||0, time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) });
    setManCal(""); setManPro(""); setManCarb(""); setManFat(""); setManSug(""); setManLabel(""); setFoodErr("");
  }

  function logWeight() {
    const v = parseFloat(wInput);
    if (!v || v < 100 || v > 400) return;
    const entry = { date:new Date().toLocaleDateString(), w:v };
    setWeights(prev => [...prev.filter(e => e.date !== entry.date), entry].sort((a,b) => new Date(a.date)-new Date(b.date)));
    setWInput("");
  }

  function toggleEx(name) {
    const k = "w"+week+"_"+day+"_"+name;
    setDone(prev => ({ ...prev, [k]: !prev[k] }));
  }

  function getCW(name) { return custom["w"+week+"_"+day+"_"+name] || null; }
  function setCW(name, val) {
    const k = "w"+week+"_"+day+"_"+name;
    if (!val || !val.trim()) { setCustom(prev => { const n={...prev}; delete n[k]; return n; }); }
    else { setCustom(prev => ({ ...prev, [k]: val.trim() })); }
  }

  async function askAI(q) {
    setAiLoading(true); setAiA("");
    const mealLog = (todayNut.meals||[]).map(m => "["+m.time+"] "+m.desc+" → "+m.cal+"cal "+m.pro+"g P").join(", ");
    const sys = "You are an elite triathlon and strength coach. Client: 6ft4in, "+latestW+"lb (goal 220lb recomp). Working weights: Squat 275lb, DB Press 100lb/hand, Deadlift 315lb. Est 1RMs: Squat 310, DB 115, DL 355. W8 targets: Squat 340, DB 120, DL 390. Week "+(week+1)+"/8 ("+wTag+"). Today: "+day+" — "+today.label+". Workout "+pct+"% done. Nutrition today: "+todayNut.cal+"/"+tgt.cal+"cal, "+todayNut.pro+"/"+tgt.pro+"g protein. Meals: "+mealLog+". Be direct and specific.";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:800, system:sys, messages:[{role:"user",content:q}] }) });
      const data = await res.json();
      setAiA(data.content?.[0]?.text || "No response.");
    } catch { setAiA("Connection error — try again."); }
    setAiLoading(false);
  }

  const S = {
    app: { minHeight:"100vh", background:"#0a0a0f", color:"#e8e8e8", fontFamily:"monospace", fontSize:13 },
    header: { background:"#0f0f1a", borderBottom:"1px solid #1e1e3a", padding:"14px 16px 0" },
    card: { background:"#0f0f1a", border:"1px solid #1e1e3a", borderRadius:6, padding:12, marginBottom:12 },
    tag: { display:"inline-block", background:tagCol+"22", border:"1px solid "+tagCol, color:tagCol, fontSize:9, letterSpacing:"0.12em", padding:"2px 8px", borderRadius:2 },
    content: { padding:"14px 14px 100px" },
    btn: (active, color) => ({ padding:"5px 10px", background:active?color:"#151520", color:active?"#fff":"#555", border:active?"1px solid "+color:"1px solid #222", borderRadius:3, cursor:"pointer", fontSize:10, fontFamily:"monospace" }),
    tabBtn: (active) => ({ flex:1, padding:"7px 4px", background:"transparent", color:active?"#fff":"#444", borderBottom:active?"1px solid #fff":"1px solid transparent", border:"none", cursor:"pointer", fontSize:9, letterSpacing:"0.1em", textTransform:"uppercase", fontFamily:"monospace" }),
    dayBtn: (d) => ({ flex:1, padding:"8px 3px", background:day===d?"#0f0f1a":"transparent", color:day===d?wo[d].color:"#444", borderBottom:day===d?"2px solid "+wo[d].color:"2px solid transparent", border:"none", cursor:"pointer", fontSize:8, fontFamily:"monospace" }),
    input: { flex:1, padding:"6px 10px", background:"#151520", border:"1px solid #2a2a40", color:"#fff", fontSize:11, borderRadius:3, fontFamily:"monospace" },
    macroCard: (color) => ({ background:"#0f0f1a", border:"1px solid #1e1e3a", borderRadius:6, padding:10 }),
  };

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
          <div>
            <div style={{ fontSize:9, color:"#4895ef", letterSpacing:"0.15em", marginBottom:2 }}>TRIATHLON STRENGTH SYSTEM</div>
            <div style={{ fontSize:17, fontWeight:700, color:"#fff" }}>8-WEEK PROGRAM</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={S.tag}>{wTag.toUpperCase()}</div>
            <div style={{ fontSize:9, color:"#555", marginTop:3 }}>WEEK {week+1} / 8</div>
          </div>
        </div>

        <div style={{ display:"flex", gap:4, overflowX:"auto", paddingBottom:10 }}>
          {W.map((w,i) => (
            <button key={i} onClick={() => setWeek(i)} style={S.btn(week===i,"#4895ef")}>{w.label}</button>
          ))}
        </div>

        <div style={{ display:"flex", borderTop:"1px solid #1e1e3a" }}>
          {DAYS.map(d => {
            const hasNut = nut["w"+week+"_"+d] && nut["w"+week+"_"+d].cal > 0;
            return (
              <button key={d} onClick={() => setDay(d)} style={S.dayBtn(d)}>
                {d.slice(0,3).toUpperCase()}
                {hasNut && <span style={{ display:"block", width:4, height:4, borderRadius:"50%", background:"#06d6a0", margin:"2px auto 0" }} />}
              </button>
            );
          })}
        </div>

        <div style={{ display:"flex", background:"#0a0a0f" }}>
          {["workout","nutrition","progress"].map(t => (
            <button key={t} onClick={() => setTab(t)} style={S.tabBtn(tab===t)}>
              {t==="workout"?"Workout":t==="nutrition"?"Nutrition":"Progress"}
            </button>
          ))}
        </div>
      </div>

      <div style={S.content}>

        {tab==="workout" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div>
                <div style={{ fontSize:9, color:today.color, letterSpacing:"0.1em" }}>{day.toUpperCase()}</div>
                <div style={{ fontSize:15, fontWeight:700, color:"#fff" }}>{today.label}</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:22, fontWeight:700, color:pct===100?"#06d6a0":today.color }}>{pct}%</div>
                <div style={{ fontSize:9, color:"#555" }}>{doneCount}/{allEx.length} done</div>
              </div>
            </div>

            <div style={{ height:3, background:"#1a1a2e", borderRadius:2, marginBottom:12 }}>
              <div style={{ height:"100%", width:pct+"%", background:today.color, borderRadius:2, transition:"width 0.3s" }} />
            </div>

            {today.warmup && (
              <div style={{ ...S.card, borderLeft:"3px solid "+today.color }}>
                <div style={{ fontSize:9, color:"#555", marginBottom:3 }}>WARM-UP</div>
                <div style={{ color:"#fff", fontSize:12, fontWeight:600 }}>{today.warmup.type} — {today.warmup.dur}</div>
                <div style={{ color:"#666", fontSize:11, marginTop:2 }}>{today.warmup.note}</div>
              </div>
            )}

            {today.blocks.map((block,bi) => (
              <div key={bi} style={{ marginBottom:12 }}>
                <div style={{ fontSize:9, color:"#555", letterSpacing:"0.1em", marginBottom:5 }}>— {block.name.toUpperCase()} —</div>
                {block.exercises.map((ex,ei) => {
                  const isDone = !!done["w"+week+"_"+day+"_"+ex.name];
                  const cw = getCW(ex.name);
                  const ek = "w"+week+"_"+day+"_"+ex.name;
                  const isEdit = editing === ek;
                  return (
                    <div key={ei} style={{ background:isDone?"#06d6a011":"#0f0f1a", border:"1px solid "+(isDone?"#06d6a033":"#1a1a2e"), borderRadius:4, marginBottom:4 }}>
                      <div style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"9px 10px" }}>
                        <div onClick={() => toggleEx(ex.name)} style={{ width:16, height:16, minWidth:16, borderRadius:"50%", border:"2px solid "+(isDone?"#06d6a0":"#333"), background:isDone?"#06d6a0":"transparent", display:"flex", alignItems:"center", justifyContent:"center", marginTop:2, cursor:"pointer" }}>
                          {isDone && <span style={{ fontSize:8, color:"#000", fontWeight:900 }}>✓</span>}
                        </div>
                        <div style={{ flex:1, minWidth:0 }} onClick={() => toggleEx(ex.name)}>
                          <div style={{ display:"flex", justifyContent:"space-between" }}>
                            <div style={{ color:isDone?"#06d6a0":"#ddd", fontSize:11, fontWeight:600, textDecoration:isDone?"line-through":"none", opacity:isDone?0.7:1 }}>{ex.name}</div>
                            <div style={{ color:today.color, fontSize:11, fontWeight:700, marginLeft:8, whiteSpace:"nowrap" }}>{ex.sets}</div>
                          </div>
                          <div style={{ display:"flex", gap:8, marginTop:2, flexWrap:"wrap" }}>
                            {ex.load && (
                              cw
                                ? <span><span style={{ color:"#555", fontSize:10, textDecoration:"line-through" }}>@ {ex.load}</span><span style={{ color:"#ffd60a", fontSize:10, fontWeight:700 }}> → {cw}</span></span>
                                : <span style={{ color:"#4895ef", fontSize:10 }}>@ {ex.load}</span>
                            )}
                            {ex.note && <span style={{ color:"#555", fontSize:10, fontStyle:"italic" }}>{ex.note}</span>}
                          </div>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); if(isEdit){setEditing(null);setEditVal("");}else{setEditing(ek);setEditVal(cw||"");} }}
                          style={{ background:"transparent", border:"1px solid "+(cw?"#ffd60a44":"#2a2a40"), color:cw?"#ffd60a":"#444", fontSize:9, padding:"3px 6px", borderRadius:3, cursor:"pointer", fontFamily:"monospace", whiteSpace:"nowrap" }}>
                          {isEdit?"✕ close":cw?"✏ edited":"✏ adjust"}
                        </button>
                      </div>
                      {isEdit && (
                        <div style={{ padding:"0 10px 8px 36px", display:"flex", gap:5, alignItems:"center" }}>
                          <div style={{ fontSize:9, color:"#555", whiteSpace:"nowrap" }}>Programmed: <span style={{ color:"#4895ef" }}>{ex.load||"BW"}</span></div>
                          <input autoFocus value={editVal} onChange={e => setEditVal(e.target.value)}
                            onKeyDown={e => { if(e.key==="Enter"){setCW(ex.name,editVal);setEditing(null);setEditVal("");} if(e.key==="Escape"){setEditing(null);setEditVal("");} }}
                            placeholder="e.g. 95lb/hand"
                            style={{ flex:1, padding:"4px 8px", background:"#1a1a2e", border:"1px solid #ffd60a55", color:"#ffd60a", fontSize:11, borderRadius:3, fontFamily:"monospace" }} />
                          <button onClick={() => { setCW(ex.name,editVal); setEditing(null); setEditVal(""); }}
                            style={{ padding:"4px 8px", background:"#ffd60a", color:"#000", border:"none", borderRadius:3, cursor:"pointer", fontSize:10, fontWeight:700, fontFamily:"monospace" }}>Save</button>
                          {cw && <button onClick={() => { setCW(ex.name,""); setEditing(null); setEditVal(""); }}
                            style={{ padding:"4px 6px", background:"transparent", color:"#f72585", border:"1px solid #f7258533", borderRadius:3, cursor:"pointer", fontSize:9, fontFamily:"monospace" }}>Reset</button>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}

            <div style={{ ...S.card, fontSize:11, color:"#888" }}>{today.note}</div>
            <AIBox onAsk={askAI} answer={aiA} loading={aiLoading} q={aiQ} setQ={setAiQ} color={today.color} />
          </div>
        )}

        {tab==="nutrition" && (
          <div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:9, color:"#06d6a0", letterSpacing:"0.1em", marginBottom:2 }}>{day.toUpperCase()} — FOOD LOG</div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <div style={{ fontSize:11, color:"#888" }}>{tgt.label} day · W{week+1}</div>
                <div style={{ fontSize:10, color:"#555" }}>Target: {tgt.cal} kcal</div>
              </div>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
              {[
                {label:"Calories",key:"cal",unit:"kcal",target:tgt.cal,color:"#e85d04"},
                {label:"Protein", key:"pro",unit:"g",   target:tgt.pro,color:"#4895ef"},
                {label:"Carbs",   key:"carb",unit:"g",  target:tgt.carb,color:"#ffd60a"},
                {label:"Fat",     key:"fat",unit:"g",   target:tgt.fat, color:"#9b5de5"},
              ].map(m => {
                const val = todayNut[m.key]||0;
                const p = Math.min(110, Math.round(val/m.target*100));
                const over = val > m.target*1.05;
                return (
                  <div key={m.key} style={S.macroCard(m.color)}>
                    <div style={{ fontSize:8, color:"#555", marginBottom:3 }}>{m.label.toUpperCase()}</div>
                    <div style={{ fontSize:20, fontWeight:700, color:over?"#f72585":"#fff", marginBottom:5 }}>{val}<span style={{ fontSize:9, color:"#555" }}>/{m.target}{m.unit}</span></div>
                    <div style={{ height:3, background:"#1a1a2e", borderRadius:2 }}>
                      <div style={{ height:"100%", width:Math.min(100,p)+"%", background:over?"#f72585":m.color, borderRadius:2 }} />
                    </div>
                    <div style={{ fontSize:8, color:p>=90&&!over?"#06d6a0":over?"#f72585":"#555", marginTop:3 }}>{p}%{over?" OVER":""}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ background:"#0f0f1a", border:"1px solid #f7258533", borderRadius:6, padding:10, marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                <div style={{ fontSize:8, color:"#f72585", letterSpacing:"0.08em" }}>SUGAR — KEEP UNDER 50g</div>
                <div style={{ fontSize:16, fontWeight:700, color:(todayNut.sug||0)>50?"#f72585":(todayNut.sug||0)>35?"#ffd60a":"#06d6a0" }}>{todayNut.sug||0}g</div>
              </div>
              <div style={{ height:4, background:"#1a1a2e", borderRadius:2, marginBottom:4 }}>
                <div style={{ height:"100%", width:Math.min(100,((todayNut.sug||0)/50)*100)+"%", background:(todayNut.sug||0)>50?"#f72585":(todayNut.sug||0)>35?"#ffd60a":"#06d6a0", borderRadius:2, transition:"width 0.3s" }} />
              </div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <div style={{ fontSize:8, color:"#555" }}>0g <span style={{ color:"#ffd60a" }}>35g caution</span> <span style={{ color:"#f72585" }}>50g limit</span></div>
                <div style={{ fontSize:8, color:"#555" }}>{Math.max(0,50-(todayNut.sug||0))}g remaining</div>
              </div>
            </div>

            <div style={S.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <div style={{ fontSize:9, color:"#555" }}>WATER INTAKE</div>
                <div style={{ fontSize:13, fontWeight:700, color:(todayNut.water||0)>=100?"#06d6a0":"#4895ef" }}>{todayNut.water||0} / 120 oz</div>
              </div>
              <div style={{ height:3, background:"#1a1a2e", borderRadius:2, marginBottom:8 }}>
                <div style={{ height:"100%", width:Math.min(100,(todayNut.water||0)/1.2)+"%", background:"#4895ef", borderRadius:2 }} />
              </div>
              <div style={{ display:"flex", gap:4 }}>
                {[8,16,24,32].map(oz => (
                  <button key={oz} onClick={() => updateNut({water:(todayNut.water||0)+oz})}
                    style={{ flex:1, padding:"5px 0", background:"#151520", border:"1px solid #2a2a40", color:"#4895ef", fontSize:10, borderRadius:3, cursor:"pointer", fontFamily:"monospace" }}>+{oz}oz</button>
                ))}
                <button onClick={() => updateNut({water:0})} style={{ padding:"5px 8px", background:"transparent", border:"1px solid #2a2a40", color:"#555", fontSize:9, borderRadius:3, cursor:"pointer", fontFamily:"monospace" }}>reset</button>
              </div>
            </div>

            <div style={{ ...S.card, border:"1px solid #06d6a044" }}>
              <div style={{ fontSize:9, color:"#06d6a0", letterSpacing:"0.1em", marginBottom:5 }}>LOG FOOD — TYPE NATURALLY</div>
              <div style={{ fontSize:10, color:"#555", marginBottom:8 }}>e.g. "3 eggs and 2 slices sourdough" or "oikos pro vanilla" or "8oz chicken breast"</div>
              <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                <textarea value={foodInput} onChange={e => setFoodInput(e.target.value)}
                  onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();logFood();} }}
                  placeholder="Describe what you ate..." rows={2}
                  style={{ flex:1, padding:"8px 10px", background:"#151520", border:"1px solid #2a2a40", color:"#fff", fontSize:11, borderRadius:3, fontFamily:"monospace", resize:"none" }} />
                <button onClick={logFood} style={{ padding:"8px 14px", background:"#06d6a0", color:"#000", border:"none", borderRadius:3, cursor:"pointer", fontSize:10, fontWeight:700, fontFamily:"monospace" }}>ADD</button>
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:foodErr?8:0 }}>
                {["3 eggs","oikos pro vanilla","2 scoops whey protein","chicken breast","banana","quest bar"].map(q => (
                  <button key={q} onClick={() => setFoodInput(q)} style={{ padding:"3px 7px", background:"transparent", border:"1px solid #2a2a4066", color:"#666", fontSize:9, borderRadius:2, cursor:"pointer", fontFamily:"monospace" }}>{q}</button>
                ))}
              </div>
              {foodErr && (
                <div>
                  <div style={{ fontSize:10, color:"#f72585", marginBottom:8 }}>{foodErr}</div>
                  <div style={{ background:"#1a1a2e", borderRadius:4, padding:10 }}>
                    <div style={{ fontSize:9, color:"#555", marginBottom:6 }}>MANUAL ENTRY</div>
                    <input value={manLabel} onChange={e => setManLabel(e.target.value)} placeholder="Description (optional)"
                      style={{ width:"100%", padding:"5px 8px", background:"#151520", border:"1px solid #2a2a40", color:"#fff", fontSize:11, borderRadius:3, fontFamily:"monospace", marginBottom:6, boxSizing:"border-box" }} />
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr", gap:4, marginBottom:6 }}>
                      {[[manCal,setManCal,"kcal"],[manPro,setManPro,"protein"],[manCarb,setManCarb,"carbs"],[manFat,setManFat,"fat"],[manSug,setManSug,"sugar g"]].map(([v,s,ph]) => (
                        <input key={ph} type="number" value={v} onChange={e => s(e.target.value)} placeholder={ph}
                          style={{ padding:"5px 6px", background:"#151520", border:"1px solid #2a2a40", color:"#fff", fontSize:10, borderRadius:3, fontFamily:"monospace", width:"100%", boxSizing:"border-box" }} />
                      ))}
                    </div>
                    <button onClick={logManual} style={{ width:"100%", padding:6, background:"#333", color:"#aaa", border:"1px solid #444", borderRadius:3, cursor:"pointer", fontSize:10, fontFamily:"monospace" }}>Add manually</button>
                  </div>
                </div>
              )}
            </div>

            {(todayNut.meals||[]).length > 0 && (
              <div style={S.card}>
                <div style={{ fontSize:9, color:"#555", marginBottom:8 }}>TODAY&#39;S MEALS</div>
                {(todayNut.meals||[]).map((meal,idx) => (
                  <div key={idx} style={{ marginBottom:idx<todayNut.meals.length-1?8:0, paddingBottom:idx<todayNut.meals.length-1?8:0, borderBottom:idx<todayNut.meals.length-1?"1px solid #111":"none" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <div style={{ fontSize:10, color:"#ddd", flex:1, paddingRight:8 }}>{meal.desc}</div>
                      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                        <span style={{ fontSize:9, color:"#555" }}>{meal.time}</span>
                        <button onClick={() => removeMeal(idx)} style={{ background:"transparent", border:"none", color:"#f7258566", cursor:"pointer", fontSize:13, padding:0, fontFamily:"monospace", lineHeight:1 }}>×</button>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      <span style={{ fontSize:10, color:"#e85d04" }}>{meal.cal}cal</span>
                      <span style={{ fontSize:10, color:"#4895ef" }}>{meal.pro}g P</span>
                      <span style={{ fontSize:10, color:"#ffd60a" }}>{meal.carb}g C</span>
                      <span style={{ fontSize:10, color:"#9b5de5" }}>{meal.fat}g F</span>
                      {(meal.sug||0)>0 && <span style={{ fontSize:10, color:"#f72585" }}>{meal.sug}g sugar</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div style={S.card}>
              <div style={{ fontSize:9, color:"#555", marginBottom:8 }}>TIMING FOR {day.toUpperCase()}</div>
              {[
                {t:"Pre-workout (2hr)", r: day==="Wednesday"||day==="Saturday"?"50g carbs + 30g protein. Swim day — keep gut light.":"50–70g carbs + 30g protein. Low fat."},
                {t:"Intra",             r: day==="Wednesday"||day==="Saturday"?"Water + electrolytes. 20–30g carbs if swim over 1,500m.":"Water + electrolytes throughout."},
                {t:"Post (30 min)",     r:"50g protein + "+(day==="Wednesday"||day==="Saturday"?"80–100g fast carbs — swim depletes glycogen hard.":"60–80g carbs. Most important meal of the day.")},
              ].map((r,i) => (
                <div key={i} style={{ marginBottom:i<2?8:0, paddingBottom:i<2?8:0, borderBottom:i<2?"1px solid #1a1a2e":"none" }}>
                  <div style={{ fontSize:10, color:"#ddd", marginBottom:2 }}>{r.t}</div>
                  <div style={{ fontSize:10, color:"#666" }}>{r.r}</div>
                </div>
              ))}
            </div>

            <div style={{ ...S.card, border:"1px solid #9b5de533" }}>
              <div style={{ fontSize:9, color:"#9b5de5", marginBottom:5 }}>RECOMP CONTEXT</div>
              <div style={{ fontSize:10, color:"#888", lineHeight:1.6 }}>
                At 6ft4in / {latestW}lb targeting 220lb. Strategy is athletic recomp — eat to fuel training, not to starve. Previous maxes were hit at ~250lb. Dropping to 220 improves power-to-weight for triathlon while preserving most strength. Target 0.5–1lb/week change. Hit protein daily — that protects muscle.
              </div>
            </div>

            <AIBox onAsk={askAI} answer={aiA} loading={aiLoading} q={aiQ} setQ={setAiQ} color="#06d6a0" />
          </div>
        )}

        {tab==="progress" && (
          <div>
            <div style={{ ...S.card, border:"1px solid #9b5de533" }}>
              <div style={{ fontSize:9, color:"#9b5de5", marginBottom:8 }}>BODYWEIGHT LOG</div>
              <div style={{ display:"flex", gap:6, marginBottom:10 }}>
                {[{label:"START",val:"235lb",color:"#fff"},{label:"CURRENT",val:latestW+"lb",color:latestW<235?"#06d6a0":latestW>235?"#f72585":"#fff"},{label:"GOAL",val:"220lb",color:"#9b5de5"}].map(({label,val,color}) => (
                  <div key={label} style={{ flex:1, background:"#151520", borderRadius:4, padding:"6px 8px" }}>
                    <div style={{ fontSize:8, color:"#555" }}>{label}</div>
                    <div style={{ fontSize:15, fontWeight:700, color }}>{val}</div>
                  </div>
                ))}
              </div>
              {weights.length > 1 && (
                <div style={{ display:"flex", gap:2, alignItems:"flex-end", height:50, marginBottom:10 }}>
                  {weights.slice(-14).map((e,i,arr) => {
                    const mn = Math.min(...arr.map(x=>x.w))-2, mx = Math.max(...arr.map(x=>x.w))+2;
                    const h = Math.max(6, Math.round((e.w-mn)/(mx-mn)*44));
                    const low = e.w === Math.min(...arr.map(x=>x.w));
                    return (
                      <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
                        <div style={{ fontSize:6, color:"#555" }}>{e.w}</div>
                        <div style={{ width:"100%", height:h, background:low?"#06d6a0":"#9b5de555", borderRadius:"2px 2px 0 0" }} />
                        <div style={{ fontSize:5, color:"#444" }}>{e.date.slice(0,5)}</div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={{ display:"flex", gap:6 }}>
                <input type="number" value={wInput} onChange={e => setWInput(e.target.value)} onKeyDown={e => e.key==="Enter"&&logWeight()} placeholder="Log weight (lb)"
                  style={{ ...S.input }} />
                <button onClick={logWeight} style={{ padding:"6px 12px", background:"#9b5de5", color:"#fff", border:"none", borderRadius:3, cursor:"pointer", fontSize:10, fontWeight:700, fontFamily:"monospace" }}>LOG</button>
              </div>
            </div>

            <div style={{ fontSize:9, color:"#f72585", letterSpacing:"0.1em", marginBottom:10 }}>STRENGTH — 8-WEEK ARC</div>

            {[
              {label:"Back Squat",       wk:WORKING.sq, e1:MAXES.sq, tgt:TARGETS.sq, prev:PREV.sq, key:"sq"},
              {label:"DB Press (per hand)", wk:WORKING.db, e1:MAXES.db, tgt:TARGETS.db, prev:PREV.db, key:"db"},
              {label:"Deadlift",         wk:WORKING.dl, e1:MAXES.dl, tgt:TARGETS.dl, prev:PREV.dl, key:"dl"},
            ].map(lift => {
              const w8load = lift.key==="sq" ? r5(lift.e1*W[7].sq) : lift.key==="dl" ? r5(lift.e1*W[7].dl) : r5(lift.e1*W[7].db);
              const gap = lift.tgt - lift.wk;
              const pctDone = Math.round(lift.wk/lift.tgt*100);
              return (
                <div key={lift.key} style={S.card}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:"#fff" }}>{lift.label}</div>
                    <div style={{ fontSize:9, color:"#555" }}>All-time: {lift.prev}lb</div>
                  </div>
                  <div style={{ display:"flex", gap:5, marginBottom:8 }}>
                    <div style={{ flex:1, background:"#151520", borderRadius:4, padding:"6px 8px" }}>
                      <div style={{ fontSize:8, color:"#555" }}>WORKING 3-5RM</div>
                      <div style={{ fontSize:14, fontWeight:700, color:"#4895ef" }}>{lift.wk}lb</div>
                    </div>
                    <div style={{ flex:1, background:"#151520", borderRadius:4, padding:"6px 8px" }}>
                      <div style={{ fontSize:8, color:"#555" }}>EST. 1RM NOW</div>
                      <div style={{ fontSize:14, fontWeight:700, color:"#e85d04" }}>{lift.e1}lb</div>
                    </div>
                    <div style={{ flex:1, background:"#151520", borderRadius:4, padding:"6px 8px", border:"1px solid #ffd60a33" }}>
                      <div style={{ fontSize:8, color:"#ffd60a" }}>W8 NEW MAX</div>
                      <div style={{ fontSize:14, fontWeight:700, color:"#ffd60a" }}>{lift.tgt}lb</div>
                    </div>
                  </div>
                  <div style={{ height:3, background:"#1a1a2e", borderRadius:2, marginBottom:4 }}>
                    <div style={{ height:"100%", width:Math.min(100,pctDone)+"%", background:"#06d6a0", borderRadius:2 }} />
                  </div>
                  <div style={{ fontSize:9, color:"#555", marginBottom:8 }}>{pctDone}% of target — {gap}lb gap — W8 warm-up top set: {w8load}lb</div>
                  <div style={{ fontSize:8, color:"#555", marginBottom:4 }}>WEEKLY LOAD (off est. 1RM)</div>
                  <div style={{ display:"flex", gap:2 }}>
                    {W.map((wk,i) => {
                      const load = lift.key==="sq" ? r5(lift.e1*wk.sq) : lift.key==="dl" ? r5(lift.e1*wk.dl) : r5(lift.e1*wk.db);
                      const mn = r5(lift.e1*0.74), mx = r5(lift.e1*0.97);
                      const h = Math.max(8, Math.round((load-mn)/(mx-mn)*44)+6);
                      const col = TAG_COLOR[wk.tag];
                      const active = i===week;
                      return (
                        <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
                          <div style={{ fontSize:6, color:active?"#fff":"#555" }}>{load}</div>
                          <div style={{ width:"100%", height:h, background:active?col:col+"55", borderRadius:"2px 2px 0 0", border:active?"1px solid "+col:"none" }} />
                          <div style={{ fontSize:6, color:active?col:"#444" }}>{wk.label}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <div style={{ fontSize:9, color:"#4895ef", letterSpacing:"0.1em", marginBottom:8 }}>WEEK {week+1} NUTRITION OVERVIEW</div>
            <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
              <div style={{ display:"grid", gridTemplateColumns:"55px 1fr 40px 40px 40px 40px", fontSize:8, color:"#555", padding:"5px 10px", borderBottom:"1px solid #1a1a2e", letterSpacing:"0.06em" }}>
                <span>DAY</span><span>CAL</span><span>PRO</span><span>CARB</span><span>FAT</span><span>SUG</span>
              </div>
              {DAYS.map(d => {
                const k = "w"+week+"_"+d;
                const n = nut[k];
                const t = TARGETS_NUT[d];
                const has = n && n.cal > 0;
                const cp = has ? Math.round(n.cal/t.cal*100) : 0;
                return (
                  <div key={d} onClick={() => { setDay(d); setTab("nutrition"); }}
                    style={{ display:"grid", gridTemplateColumns:"55px 1fr 40px 40px 40px 40px", padding:"7px 10px", borderBottom:"1px solid #111", cursor:"pointer", background:day===d?"#151520":"transparent", alignItems:"center" }}>
                    <span style={{ fontSize:9, color:wo[d].color }}>{d.slice(0,3)}</span>
                    <div style={{ paddingRight:6 }}>
                      {has ? (
                        <div>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                            <span style={{ fontSize:9, color:cp>108?"#f72585":"#fff" }}>{n.cal}</span>
                            <span style={{ fontSize:8, color:"#555" }}>{cp}%</span>
                          </div>
                          <div style={{ height:2, background:"#1a1a2e", borderRadius:1 }}>
                            <div style={{ height:"100%", width:Math.min(100,cp)+"%", background:cp>108?"#f72585":"#06d6a0", borderRadius:1 }} />
                          </div>
                        </div>
                      ) : <span style={{ fontSize:8, color:"#333" }}>not logged</span>}
                    </div>
                    <span style={{ fontSize:9, color:has?"#4895ef":"#333" }}>{has?n.pro+"g":"—"}</span>
                    <span style={{ fontSize:9, color:has?"#ffd60a":"#333" }}>{has?n.carb+"g":"—"}</span>
                    <span style={{ fontSize:9, color:has?"#9b5de5":"#333" }}>{has?n.fat+"g":"—"}</span>
                    <span style={{ fontSize:9, color:has&&(n.sug||0)>50?"#f72585":has?"#f7258599":"#333" }}>{has?(n.sug||0)+"g":"—"}</span>
                  </div>
                );
              })}
            </div>

            <div style={{ marginTop:14 }}>
              <AIBox onAsk={askAI} answer={aiA} loading={aiLoading} q={aiQ} setQ={setAiQ} color="#f72585" />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AIBox({ onAsk, answer, loading, q, setQ, color }) {
  const quick = ["Am I on track this week?","What should I eat post-workout?","How is my recomp going?","Should I push harder or deload?"];
  return (
    <div style={{ background:"#0f0f1a", border:"1px solid "+color+"33", borderRadius:6, padding:12 }}>
      <div style={{ fontSize:9, color:color, letterSpacing:"0.1em", marginBottom:8 }}>AI COACH</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:8 }}>
        {quick.map(qq => (
          <button key={qq} onClick={() => onAsk(qq)} style={{ padding:"3px 7px", background:"transparent", border:"1px solid "+color+"44", color:color, fontSize:9, borderRadius:2, cursor:"pointer", fontFamily:"monospace" }}>{qq}</button>
        ))}
      </div>
      <div style={{ display:"flex", gap:6 }}>
        <input value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==="Enter"&&q&&onAsk(q)}
          placeholder="Ask your coach anything..."
          style={{ flex:1, padding:"6px 10px", background:"#151520", border:"1px solid #2a2a40", color:"#fff", fontSize:11, borderRadius:3, fontFamily:"monospace" }} />
        <button onClick={() => q && onAsk(q)} style={{ padding:"6px 12px", background:color, color:"#000", border:"none", borderRadius:3, cursor:"pointer", fontSize:10, fontWeight:700, fontFamily:"monospace" }}>ASK</button>
      </div>
      {loading && <div style={{ marginTop:8, color:"#555", fontSize:10 }}>Coach is analyzing...</div>}
      {answer && !loading && (
        <div style={{ marginTop:10, padding:"10px 12px", background:"#151520", border:"1px solid #1e1e3a", borderRadius:4, fontSize:11, color:"#ccc", lineHeight:1.7, whiteSpace:"pre-wrap" }}>{answer}</div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
